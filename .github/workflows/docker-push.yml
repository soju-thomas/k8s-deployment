name: Build and Deploy to GKE

on:
  push:
    branches:
      - main

env:
  CLUSTER_NAME: multi-k8s
  CLUSTER_ZONE: asia-southeast1
  PROJECT_ID: multi-k8s-497915

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            context: ./nginx
            docker_repo: sojucr7/gateway

          - name: client
            context: ./client
            docker_repo: sojucr7/client

          - name: worker
            context: ./worker
            docker_repo: sojucr7/worker

          - name: server
            context: ./server
            docker_repo: sojucr7/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build dev image (frontend only)
        if: matrix.name == 'client'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile.dev
          push: false
          tags: test-client:latest

      - name: Run frontend tests
        if: matrix.name == 'client'
        run: |
          docker run --rm \
          -e CI=true \
          test-client:latest \
          npm test -- --watchAll=false

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: |
            ${{ matrix.docker_repo }}:latest
            ${{ matrix.docker_repo }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials \
          $CLUSTER_NAME \
          --region $CLUSTER_ZONE \
          --project $PROJECT_ID

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/

      - name: Update client image
        run: |
          kubectl set image deployment/client-deployment \
          client=sojucr7/client:${{ github.sha }}

      - name: Update worker image
        run: |
          kubectl set image deployment/worker-deployment \
          worker=sojucr7/worker:${{ github.sha }}

      - name: Update server image
        run: |
          kubectl set image deployment/server-deployment \
          server=sojucr7/api:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gateway
          kubectl rollout status deployment/client
          kubectl rollout status deployment/worker-deployment
          kubectl rollout status deployment/server-deployment